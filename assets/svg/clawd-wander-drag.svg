<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .body-drift {
        transform-origin: 7.5px 13px;
        animation: drift 1.1s infinite alternate ease-in-out;
      }

      .eyes-squint {
        animation: squint 1.1s infinite alternate ease-in-out;
        transform-origin: 7.5px 9px;
      }

      .shadow-lift {
        transform-origin: 7.5px 15px;
        animation: shadow-pulse 1.1s infinite alternate ease-in-out;
      }

      @keyframes drift {
        0%   { transform: translate(-0.25px, 0); }
        100% { transform: translate(0.25px, 0); }
      }

      @keyframes squint {
        0%   { opacity: 0.9; }
        100% { opacity: 1; }
      }

      @keyframes shadow-pulse {
        0%   { transform: scale(0.9, 1); opacity: 0.35; }
        100% { transform: scale(1, 1); opacity: 0.45; }
      }
    </style>
  </defs>

  <g class="shadow-lift">
    <rect x="3" y="15" width="9" height="1" fill="#000000"/>
  </g>

  <g id="legs" fill="#DE886D">
    <rect x="3" y="11" width="1" height="4"/>
    <rect x="5" y="11" width="1" height="4"/>
    <rect x="9" y="11" width="1" height="4"/>
    <rect x="11" y="11" width="1" height="4"/>
  </g>

  <g class="body-drift">
    <rect x="2" y="6" width="11" height="7" fill="#DE886D"/>
    <rect x="0" y="9" width="2" height="2" fill="#DE886D"/>
    <rect x="13" y="9" width="2" height="2" fill="#DE886D"/>

    <g class="eyes-squint" fill="none" stroke="#000000" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4,8 5.5,9 4,10"/>
      <polyline points="11,8 9.5,9 11,10"/>
    </g>
  </g>
</svg>
